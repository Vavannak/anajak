<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Teams - FootballHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-futbol"></i>
                <span>FootballHub</span>
            </div>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="teams.html" class="active">Teams</a>
                <a href="#" id="matchesLink">Matches</a>
                <a href="#" id="statsLink">Statistics</a>
            </div>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </nav>

    <section class="page-header">
        <div class="container">
            <h1>All Teams</h1>
            <div class="search-filter">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchTeams" placeholder="Search teams by name, city, or stadium...">
                </div>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="premier-league">Premier League</button>
                    <button class="filter-btn" data-filter="la-liga">La Liga</button>
                    <button class="filter-btn" data-filter="bundesliga">Bundesliga</button>
                    <button class="filter-btn" data-filter="serie-a">Serie A</button>
                </div>
            </div>
        </div>
    </section>

    <section class="teams-section">
        <div class="container">
            <div class="teams-grid" id="allTeams">
                <!-- All teams loaded dynamically -->
            </div>
            <div class="pagination" id="pagination">
                <!-- Pagination controls -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3><i class="fas fa-futbol"></i> FootballHub</h3>
                    <p>Your comprehensive source for football team information.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="teams.html">Teams</a></li>
                        <li><a href="#">Matches</a></li>
                    </ul>
                </div>
                <div class="footer-section">
                    <h4>Follow Us</h4>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-twitter"></i></a>
                        <a href="#"><i class="fab fa-facebook"></i></a>
                        <a href="#"><i class="fab fa-instagram"></i></a>
                    </div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 FootballHub. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script src="js/teams.js"></script>
</body>
</html>
