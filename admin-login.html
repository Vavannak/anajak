<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FootballHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .login-icon i {
            font-size: 40px;
            color: white;
        }

        .login-header h2 {
            font-size: 28px;
            color: #333;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-group i:first-child {
            position: absolute;
            left: 15px;
            color: #999;
            font-size: 18px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .toggle-password {
            position: absolute;
            right: 15px;
            cursor: pointer;
            color: #999;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #667eea;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
            font-size: 14px;
        }

        .checkbox-label input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s;
        }

        .forgot-link:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .security-badge {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            font-size: 12px;
            color: #999;
        }

        .security-badge i {
            margin: 0 3px;
        }

        /* Demo credentials hint */
        .demo-hint {
            background: #f0f9ff;
            border-left: 4px solid #667eea;
            padding: 12px;
            margin-top: 20px;
            border-radius: 8px;
            font-size: 12px;
            color: #666;
        }

        .demo-hint strong {
            color: #667eea;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 25px;
            }
            
            .login-header h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <h2>Admin Login</h2>
                <p>Enter your credentials to access the control panel</p>
            </div>

            <div id="errorMessage" class="error-message" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Invalid username or password</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="Username" required autocomplete="off">
                    </div>
                </div>

                <div class="form-group">
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Password" required>
                        <i class="fas fa-eye toggle-password" id="togglePassword"></i>
                    </div>
                </div>

                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>

                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Login to Dashboard</span>
                </button>
            </form>

            <div class="demo-hint">
                <i class="fas fa-info-circle"></i>
                <strong>Demo Credentials:</strong><br>
                Username: <strong>admin</strong> | Password: <strong>admin123</strong>
            </div>

            <div class="security-badge">
                <i class="fas fa-lock"></i> Secure Login
                <i class="fas fa-shield-alt"></i> Protected Area
            </div>
        </div>
    </div>

    <script>
        // Admin credentials (in production, this should be on the server)
        const ADMIN_CREDENTIALS = {
            admin: {
                password: 'admin123',
                role: 'super_admin',
                name: 'Administrator',
                email: 'admin@footballhub.com'
            },
            editor: {
                password: 'editor123',
                role: 'editor',
                name: 'Content Editor',
                email: 'editor@footballhub.com'
            },
            viewer: {
                password: 'viewer123',
                role: 'viewer',
                name: 'Viewer',
                email: 'viewer@footballhub.com'
            }
        };

        // Get DOM elements
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const rememberMeCheckbox = document.getElementById('rememberMe');
        const togglePasswordBtn = document.getElementById('togglePassword');

        // Toggle password visibility
        togglePasswordBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Check for saved credentials
        function loadSavedCredentials() {
            const savedUsername = localStorage.getItem('savedUsername');
            const savedPassword = localStorage.getItem('savedPassword');
            const rememberMe = localStorage.getItem('rememberMe') === 'true';
            
            if (rememberMe && savedUsername && savedPassword) {
                usernameInput.value = savedUsername;
                passwordInput.value = savedPassword;
                rememberMeCheckbox.checked = true;
            }
        }

        // Save credentials
        function saveCredentials(username, password, remember) {
            if (remember) {
                localStorage.setItem('savedUsername', username);
                localStorage.setItem('savedPassword', password);
                localStorage.setItem('rememberMe', 'true');
            } else {
                localStorage.removeItem('savedUsername');
                localStorage.removeItem('savedPassword');
                localStorage.setItem('rememberMe', 'false');
            }
        }

        // Show error message
        function showError(message) {
            errorText.textContent = message;
            errorMessage.style.display = 'flex';
            setTimeout(() => {
                errorMessage.style.display = 'none';
            }, 3000);
        }

        // Login function
        function attemptLogin(username, password, remember) {
            // Check if credentials match any admin user
            if (ADMIN_CREDENTIALS[username] && ADMIN_CREDENTIALS[username].password === password) {
                // Login successful
                const userData = {
                    username: username,
                    role: ADMIN_CREDENTIALS[username].role,
                    name: ADMIN_CREDENTIALS[username].name,
                    email: ADMIN_CREDENTIALS[username].email,
                    loginTime: new Date().toISOString(),
                    token: btoa(username + ':' + Date.now()) // Simple token generation
                };
                
                // Save user session
                localStorage.setItem('adminToken', userData.token);
                localStorage.setItem('adminUser', JSON.stringify(userData));
                
                // Save credentials if remember me is checked
                saveCredentials(username, password, remember);
                
                // Log login activity
                logActivity('Admin Login', `${username} logged in successfully`);
                
                // Redirect to admin dashboard
                window.location.href = 'admin.html';
                return true;
            }
            
            return false;
        }

        // Log activity function
        function logActivity(action, details) {
            let activityLog = localStorage.getItem('adminActivityLog');
            let logs = activityLog ? JSON.parse(activityLog) : [];
            
            logs.unshift({
                id: Date.now(),
                action: action,
                details: details,
                timestamp: new Date().toISOString(),
                user: usernameInput.value
            });
            
            // Keep only last 50 logs
            if (logs.length > 50) logs = logs.slice(0, 50);
            
            localStorage.setItem('adminActivityLog', JSON.stringify(logs));
        }

        // Handle form submission
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            const remember = rememberMeCheckbox.checked;
            
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }
            
            // Attempt login
            const loginSuccess = attemptLogin(username, password, remember);
            
            if (!loginSuccess) {
                showError('Invalid username or password. Please try again.');
                // Log failed attempt
                logActivity('Failed Login Attempt', `Failed login for username: ${username} from IP: ${getUserIP()}`);
            }
        });

        // Get user IP (simulated for demo)
        function getUserIP() {
            return '127.0.0.1';
        }

        // Check if already logged in
        function checkExistingSession() {
            const token = localStorage.getItem('adminToken');
            const user = localStorage.getItem('adminUser');
            
            if (token && user) {
                // Verify token (simple validation)
                const userData = JSON.parse(user);
                if (userData.token === token) {
                    // Redirect to admin panel
                    window.location.href = 'admin.html';
                }
            }
        }

        // Forgot password handler
        document.querySelector('.forgot-link').addEventListener('click', (e) => {
            e.preventDefault();
            showError('Please contact system administrator to reset your password.');
        });

        // Load saved credentials on page load
        loadSavedCredentials();
        
        // Check existing session
        checkExistingSession();

        // Add enter key handler
        passwordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loginForm.dispatchEvent(new Event('submit'));
            }
        });

        // Clear error on input
        usernameInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });
        
        passwordInput.addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });
    </script>
</body>
</html>
