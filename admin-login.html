<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - FootballHub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fas fa-shield-alt"></i>
                <h2 data-i18n="admin.login">Admin Login</h2>
                <p>Access the administrative control panel</p>
            </div>
            
            <form id="adminLoginForm">
                <div class="form-group">
                    <label data-i18n="admin.username">Username</label>
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" required placeholder="Enter username">
                    </div>
                </div>
                
                <div class="form-group">
                    <label data-i18n="admin.password">Password</label>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" required placeholder="Enter password">
                        <i class="fas fa-eye toggle-password"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span data-i18n="admin.loginBtn">Login</span>
                </button>
            </form>
            
            <div id="loginError" class="login-error" style="display: none;">
                <i class="fas fa-exclamation-circle"></i>
                Invalid username or password
            </div>
        </div>
    </div>
    
    <script src="js/i18n.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
